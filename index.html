<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Dossier">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f9f9f7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d0d0d">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232a78d6'/%3E%3Cg fill='%23fff'%3E%3Crect x='6' y='17' width='5' height='9' rx='1.5'/%3E%3Crect x='13.5' y='11' width='5' height='15' rx='1.5'/%3E%3Crect x='21' y='6' width='5' height='20' rx='1.5'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Dossier Titoli</title>
<style>
/* ---------- Design tokens (palette validata, light/dark) ---------- */
:root[data-theme="light"]{
  color-scheme:light;
  --page:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --baseline:#c3c2b7; --border:rgba(11,11,11,.10); --wash:rgba(11,11,11,.04);
  --s1:#2a78d6; --s2:#008300; --s3:#e87ba4; --s4:#eda100; --s5:#1baf7a; --s6:#eb6834; --s7:#4a3aa7; --s8:#e34948;
  --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b;
  --up:#006300; --down:#d03b3b;
  --accent:#2a78d6; --accent-ink:#ffffff;
  --shadow:0 6px 24px rgba(11,11,11,.10);
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --page:#0d0d0d; --surface:#1a1a19; --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,.10); --wash:rgba(255,255,255,.05);
  --s1:#3987e5; --s2:#008300; --s3:#d55181; --s4:#c98500; --s5:#199e70; --s6:#d95926; --s7:#9085e9; --s8:#e66767;
  --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b;
  --up:#0ca30c; --down:#e66767;
  --accent:#3987e5; --accent-ink:#ffffff;
  --shadow:0 6px 24px rgba(0,0,0,.45);
}
/* ---------- Base ---------- */
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{
  margin:0; background:var(--page); color:var(--ink);
  font:14px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif;
  -webkit-font-smoothing:antialiased;
}
button,select,input,.tab,.pill{touch-action:manipulation}
h1,h2,h3,h4{margin:0;font-weight:650}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
input,select,textarea{font:inherit;color:var(--ink)}
a{color:var(--accent)}
::selection{background:color-mix(in oklab, var(--accent) 25%, transparent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}

/* ---------- Header & nav ---------- */
.app-head{
  position:sticky;top:0;z-index:30;background:color-mix(in oklab, var(--page) 88%, transparent);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
  padding-top:env(safe-area-inset-top);
}
.app-head .bar{max-width:1180px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:6px 12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-size:15.5px;font-weight:700;letter-spacing:-.01em}
.brand .logo{width:26px;height:26px;border-radius:7px;background:var(--accent);display:grid;place-items:center;flex:none}
.brand .logo svg{display:block}
.save-badge{font-size:11.5px;color:var(--muted);margin-left:2px;white-space:nowrap}
.head-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.tabs{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:9px 13px;font-size:13.5px;color:var(--ink2);border-radius:9px 9px 0 0;
  white-space:nowrap;border-bottom:2px solid transparent;font-weight:500;
}
.tab:hover{background:var(--wash)}
.tab.active{color:var(--ink);font-weight:650;border-bottom-color:var(--accent)}

/* ---------- Layout ---------- */
.wrap{max-width:1180px;margin:0 auto;
  padding:18px calc(20px + env(safe-area-inset-right)) calc(90px + env(safe-area-inset-bottom)) calc(20px + env(safe-area-inset-left))}
.grid{display:grid;gap:14px}
.cols-2{grid-template-columns:1fr 1fr}
.cols-32{grid-template-columns:3fr 2fr}
.cols-23{grid-template-columns:2fr 3fr}
@media (max-width:880px){.cols-2,.cols-32,.cols-23{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px}
.card > h3{font-size:14px;margin-bottom:2px}
.card .sub{color:var(--muted);font-size:12px;margin-bottom:10px}
.chart-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.chart-head .grow{flex:1;min-width:0}
.section-title{font-size:13px;font-weight:650;color:var(--ink2);margin:22px 0 10px;text-transform:uppercase;letter-spacing:.04em}
.mt{margin-top:14px}

/* ---------- KPI tiles ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 16px}
.kpi .label{font-size:12px;color:var(--ink2)}
.kpi .value{font-size:24px;font-weight:650;letter-spacing:-.015em;margin-top:2px;white-space:nowrap}
.kpi .value.hero{font-size:30px}
.kpi .delta{font-size:12.5px;font-weight:600;margin-top:2px}
.kpi .note{font-size:11.5px;color:var(--muted);margin-top:2px}
.pos{color:var(--up)} .neg{color:var(--down)} .flat{color:var(--muted)}
@media (max-width:880px){.kpi .value{font-size:21px}.kpi .value.hero{font-size:28px}}

/* ---------- Tables ---------- */
.tbl-wrap{overflow-x:auto;margin:0 -16px;padding:0 16px}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{
  text-align:left;font-size:11.5px;font-weight:600;color:var(--muted);
  padding:7px 10px;border-bottom:1px solid var(--baseline);white-space:nowrap;
  text-transform:uppercase;letter-spacing:.03em;user-select:none;
}
.tbl th.sortable{cursor:pointer}
.tbl th.sortable:hover{color:var(--ink2)}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--grid);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover{background:var(--wash)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl .main{font-weight:600}
.tbl .sm{font-size:11.5px;color:var(--muted)}
.tbl td.actions{text-align:right;white-space:nowrap}
.row-btn{padding:4px 7px;border-radius:7px;color:var(--muted);font-size:12px}
.row-btn:hover{background:var(--wash);color:var(--ink)}
.row-btn.danger:hover{color:var(--critical)}
.totrow td{border-top:1px solid var(--baseline);font-weight:650;border-bottom:none}

/* ---------- Chips & badges ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
  padding:2.5px 9px;border-radius:999px;background:var(--wash);color:var(--ink2);white-space:nowrap}
.chip .dot{width:8px;height:8px;border-radius:50%;flex:none}
.wl-badge{display:inline-block;font-size:10px;font-weight:700;color:var(--ink2);
  border:1px solid var(--baseline);border-radius:5px;padding:0 4px;margin-left:6px;vertical-align:1px}
.warn-ic{color:var(--serious);font-weight:700}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:7.5px 13px;border-radius:9px;
  font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--surface);
  transition:background .12s;white-space:nowrap;
}
.btn:hover{background:var(--wash)}
.btn.primary{background:var(--accent);border-color:transparent;color:var(--accent-ink)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.danger{color:var(--critical)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--ink2)}
.btn.ghost:hover{background:var(--wash);color:var(--ink)}
.btn.sm{padding:5px 9px;font-size:12px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:default}
.btn svg{flex:none}
.btn:active{background:var(--wash)}
.btn.primary:active{filter:brightness(.93)}

/* ---------- Forms ---------- */
.fld{display:block;margin-bottom:11px;min-width:0}
.fld > span{display:block;font-size:12px;color:var(--ink2);margin-bottom:4px;font-weight:500}
.in{
  width:100%;background:var(--page);border:1px solid var(--border);border-radius:9px;
  padding:8px 10px;font-size:13.5px;
}
.in:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
.in.num{text-align:right;font-variant-numeric:tabular-nums}
textarea.in{resize:vertical;min-height:70px}
.frm-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.frm-grid .full{grid-column:1/-1}
@media (max-width:560px){.frm-grid{grid-template-columns:1fr}}
.hint{font-size:11.5px;color:var(--muted);margin-top:-7px;margin-bottom:11px}
.check{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:11px;cursor:pointer}
.check input{width:15px;height:15px;accent-color:var(--accent)}

/* ---------- Modal ---------- */
.modal-back{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;
  display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow:auto;
}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:15px;
  width:100%;max-width:600px;padding:20px;box-shadow:var(--shadow);margin-bottom:5vh;
}
.modal.wide{max-width:860px}
.modal h3{font-size:16px;margin-bottom:2px}
.modal .m-sub{color:var(--muted);font-size:12.5px;margin-bottom:14px}
.m-actions{
  display:flex;justify-content:flex-end;gap:9px;
  position:sticky;bottom:-20px;z-index:5;background:var(--surface);
  margin:16px -20px -20px;padding:12px 20px calc(14px + env(safe-area-inset-bottom));
  border-top:1px solid var(--grid);border-radius:0 0 15px 15px;
}

/* ---------- Tooltip / toast / empty / banner ---------- */
#tip{
  position:fixed;z-index:70;pointer-events:none;display:none;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:8px 11px;font-size:12.5px;box-shadow:var(--shadow);max-width:280px;
}
#tip .t-title{font-weight:600;font-size:12px;color:var(--ink2);margin-bottom:4px}
#tip .t-row{display:flex;align-items:center;gap:7px;margin-top:2px}
#tip .t-key{width:11px;height:3px;border-radius:2px;flex:none}
#tip .t-val{font-weight:650;font-variant-numeric:tabular-nums}
#tip .t-lab{color:var(--ink2)}
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;
  background:var(--ink);color:var(--page);padding:10px 16px;border-radius:11px;
  font-size:13px;font-weight:500;box-shadow:var(--shadow);animation:tin .18s ease-out;
}
@keyframes tin{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
.empty{
  padding:30px 20px;text-align:center;color:var(--muted);font-size:13.5px;
  border:1px dashed var(--baseline);border-radius:12px;
}
.empty .btn{margin-top:12px}
.banner{border-radius:11px;padding:10px 13px;font-size:12.5px;line-height:1.5;border:1px solid var(--border)}
.banner.warn{background:color-mix(in oklab, var(--warning) 13%, var(--surface));}
.banner.info{background:color-mix(in oklab, var(--accent) 9%, var(--surface));}
.banner b{font-weight:650}
.disc{font-size:11.5px;color:var(--muted);line-height:1.55}

/* ---------- Charts ---------- */
.legend{display:flex;flex-wrap:wrap;gap:6px 16px;font-size:12px;color:var(--ink2);margin-top:10px;align-items:center}
.legend .li{display:inline-flex;align-items:center;gap:6px}
.legend .sw{width:10px;height:10px;border-radius:3px;flex:none}
.legend .lw{width:13px;height:3px;border-radius:2px;flex:none}
.legend .lval{font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
/* stacked horizontal bar */
.sbar{display:flex;height:26px;border-radius:6px;overflow:hidden;gap:2px;background:transparent}
.sbar .seg{position:relative;min-width:3px;display:flex;align-items:center;justify-content:center;cursor:default}
.sbar .seg:first-child{border-radius:6px 0 0 6px}
.sbar .seg:last-child{border-radius:0 6px 6px 0}
.sbar .seg:only-child{border-radius:6px}
.sbar .seg span{font-size:11px;font-weight:700;pointer-events:none}
.sbar .seg:hover{filter:brightness(1.07)}
/* horizontal bars */
.hbars{display:grid;gap:8px}
.hb{display:grid;grid-template-columns:130px 1fr;gap:10px;align-items:center;font-size:12.5px}
.hb .lab{color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.hb .track{display:flex;align-items:center;gap:8px;min-width:0}
.hb .bar{height:16px;border-radius:0 4px 4px 0;background:var(--s1);flex:none;transition:width .3s}
.hb .bar:hover{filter:brightness(1.07)}
.hb .val{font-size:12px;color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.hb .pct{color:var(--muted);font-weight:500}
@media (max-width:560px){.hb{grid-template-columns:96px 1fr}}
svg.chart{display:block;width:100%;touch-action:pan-y}
svg.chart text{font:11px system-ui,-apple-system,"Segoe UI",sans-serif;fill:var(--muted)}
svg.chart .axis{stroke:var(--baseline);stroke-width:1}
svg.chart .gridline{stroke:var(--grid);stroke-width:1}
svg.chart .crossh{stroke:var(--baseline);stroke-width:1}
.tbl-toggle{margin-left:auto;flex:none}
.pill-group{display:inline-flex;background:var(--wash);border-radius:9px;padding:2px;gap:2px}
.pill{padding:4.5px 11px;font-size:12px;font-weight:600;color:var(--ink2);border-radius:7px}
.pill.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.filters .spacer{flex:1}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.toolbar .spacer{flex:1}
.search{max-width:230px}
kbd{background:var(--wash);border:1px solid var(--border);border-radius:5px;padding:0 5px;font-size:11px}
.mono{font-variant-numeric:tabular-nums}
.dot-sep{color:var(--baseline);margin:0 6px}
.file-drop{border:1.5px dashed var(--baseline);border-radius:12px;padding:18px;text-align:center;color:var(--muted);font-size:13px;cursor:pointer}
.file-drop:hover{background:var(--wash)}
.file-drop.on{border-color:var(--accent);background:color-mix(in oklab, var(--accent) 7%, var(--surface))}
.map-grid{display:grid;grid-template-columns:160px 1fr;gap:8px 12px;align-items:center;font-size:13px}
.imp-report{font-size:12.5px;line-height:1.6;margin-top:10px}
.imp-report .ok{color:var(--up);font-weight:600}
.imp-report .ko{color:var(--critical);font-weight:600}

/* ---------- Ottimizzazioni touch / iPhone ---------- */
@media (pointer:coarse){
  .in, select.in, textarea.in{font-size:16px;padding:10px 12px}   /* ≥16px: evita lo zoom automatico iOS */
  .btn{padding:10px 15px}
  .btn.sm{padding:8px 12px;font-size:12.5px}
  .row-btn{padding:8px 10px;font-size:12.5px}
  .tab{padding:11px 15px}
  .pill{padding:7px 13px}
  .check input{width:18px;height:18px}
  .tbl-wrap{-webkit-overflow-scrolling:touch}
}
@media (max-width:640px){
  .hide-sm{display:none}
  .search{max-width:none;flex:1;min-width:150px}
  .toolbar .btn{flex:none}
  .modal-back{padding:2.5vh 8px}
  .modal{padding:16px}
  .m-actions{margin:16px -16px -16px;padding:12px 16px calc(14px + env(safe-area-inset-bottom));bottom:-16px}
  .m-actions .btn{flex:1;justify-content:center}
  .tbl th{padding:6px 7px}
  .tbl td{padding:8px 7px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .frm-grid{grid-template-columns:1fr}
  .save-badge{display:none}
  .app-head .bar{padding:10px 12px}
  .brand{white-space:nowrap}
  .tabs{padding:0 12px}
  .map-grid{grid-template-columns:1fr;gap:2px 0}
  .map-grid > span{margin-top:8px}
}
</style>
</head>
<body>
<header class="app-head">
  <div class="bar">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg width="15" height="15" viewBox="0 0 15 15"><g fill="#fff"><rect x="1.5" y="8" width="3" height="5.5" rx="1"/><rect x="6" y="4.5" width="3" height="9" rx="1"/><rect x="10.5" y="1.5" width="3" height="12" rx="1"/></g></svg>
      </span>
      <span>Dossier Titoli</span>
      <span class="save-badge" id="saveBadge"></span>
    </div>
    <div class="head-actions">
      <button class="btn sm" id="btnPrezzi" title="Aggiorna i prezzi di mercato">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 13.5 6 8l3 3 5-7"/><path d="M10.5 4H14v3.5"/></svg>
        Aggiorna prezzi
      </button>
      <button class="btn sm ghost" id="btnTheme" title="Tema: automatico / chiaro / scuro"></button>
    </div>
  </div>
  <nav class="tabs" id="tabs" role="tablist"></nav>
</header>

<main class="wrap" id="view"></main>

<div id="tip" role="status"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
'use strict';
/* ================= Helpers ================= */
const $ = s => document.querySelector(s);
const todayISO = () => { const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const thisYear = () => new Date().getFullYear();
let _uidC = 0;
const uid = () => (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : 'id-'+Date.now()+'-'+(_uidC++);
const sum = arr => arr.reduce((a,b)=>a+b,0);
const round2 = v => Math.round(v*100)/100;

const _eur  = new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'});
const _eur0 = new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const fmtEur  = v => _eur.format(v||0);
const fmtEur0 = v => _eur0.format(v||0);
const fmtSEur = v => (v>0?'+':'') + _eur.format(v||0);
const fmtNum = (v,d=2) => new Intl.NumberFormat('it-IT',{minimumFractionDigits:0,maximumFractionDigits:d}).format(v||0);
const fmtQty = v => fmtNum(v, Math.abs(v)%1<1e-9 ? 0 : 4);
const fmtPct = (v,sign=true) => (sign&&v>0?'+':'') + fmtNum(v,1) + '%';
const fmtDate = iso => { if(!iso) return '—'; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; };
const plClass = v => Math.abs(v)<0.005 ? 'flat' : (v>0?'pos':'neg');

function parseNum(s){
  if(typeof s==='number') return isFinite(s)?s:null;
  if(s==null) return null;
  s = String(s).trim().replace(/[€$£\s%]/g,'').replace(/[''`]/g,'');
  if(!s) return null;
  const lastC = s.lastIndexOf(','), lastD = s.lastIndexOf('.');
  if(lastC>-1 && lastD>-1){ s = lastC>lastD ? s.replace(/\./g,'').replace(',','.') : s.replace(/,/g,''); }
  else if(lastC>-1){ s = (s.match(/,/g)||[]).length>1 ? s.replace(/,/g,'') : s.replace(',','.'); }
  else if(lastD>-1 && (s.match(/\./g)||[]).length>1){ s = s.replace(/\./g,''); }
  const v = parseFloat(s);
  return isFinite(v) ? v : null;
}
function parseDateAny(s){
  if(!s) return null; s = String(s).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  m = s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})/);
  if(m){ let y=m[3]; if(y.length===2) y=(+y>50?'19':'20')+y; return `${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`; }
  return null;
}

/* DOM builder — user data always via textNode (mai innerHTML) */
function h(tag, attrs, ...kids){
  const el = document.createElement(tag);
  if(attrs) for(const [k,v] of Object.entries(attrs)){
    if(v==null) continue;
    if(k==='class') el.className=v;
    else if(k==='style') el.style.cssText=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2), v);
    else if(k==='dataset') Object.assign(el.dataset, v);
    else el.setAttribute(k, v);
  }
  for(const kid of kids.flat(9)){
    if(kid==null||kid===false) continue;
    el.append(kid.nodeType ? kid : document.createTextNode(kid));
  }
  return el;
}
const SVGNS='http://www.w3.org/2000/svg';
function sv(tag, attrs, ...kids){
  const el=document.createElementNS(SVGNS, tag);
  if(attrs) for(const [k,v] of Object.entries(attrs)){
    if(v==null) continue;
    if(k.startsWith('on')) el.addEventListener(k.slice(2), v); else el.setAttribute(k,v);
  }
  for(const kid of kids.flat(9)){ if(kid!=null&&kid!==false) el.append(kid.nodeType?kid:document.createTextNode(kid)); }
  return el;
}

/* ================= Cambi ================= */
const fxRate = ccy => (!ccy || ccy==='EUR') ? 1 : (parseNum(state.settings.fx[ccy]) || 1);

/* ================= Motore posizioni (PMC — costo medio ponderato) ================= */
function classify(asset, gain){
  // Classe fiscale della plusvalenza: ETF/fondi (OICR) → redditi di capitale (non compensabili).
  // Minusvalenze: sempre redditi diversi (zainetto). Override per posizione con asset.fiscale.
  if(gain < 0) return 'RD';
  if(asset.fiscale==='rd') return 'RD';
  if(asset.fiscale==='rc') return 'RC';
  return (asset.tipo==='etf'||asset.tipo==='fondo') ? 'RC' : 'RD';
}
const fiscFactor = asset => asset.wl ? 0.4808 : 1;   // titoli di Stato / white list: imponibile al 48,08%

function buildBook(){
  const byId = new Map();
  for(const a of state.assets) byId.set(a.id, {asset:a, qty:0, pmc:0, realized:[], income:0, oversell:false});
  const txs = [...state.txs].sort((x,y)=> (x.data||'').localeCompare(y.data||'') || (x.seq||0)-(y.seq||0));
  const txWarn = new Set();
  for(const t of txs){
    const p = byId.get(t.assetId); if(!p) continue;
    const f = qFactor(p.asset), fx = fxRate(p.asset.valuta);
    const q = t.qta||0, prezzo = t.prezzo||0, comm = t.comm||0;
    if(t.tipo==='buy'){
      const costPrev = p.pmc*p.qty*f, costNew = prezzo*q*f + comm;   // commissioni capitalizzate nel PMC
      p.qty += q;
      p.pmc = p.qty>0 ? (costPrev+costNew)/(p.qty*f) : 0;
    } else {
      if(q > p.qty + 1e-9){ p.oversell = true; txWarn.add(t.id); }
      const gainCcy = (prezzo - p.pmc)*q*f - comm;
      const gainEur = gainCcy*fx;
      const classe = classify(p.asset, gainEur);
      p.realized.push({ data:t.data, anno:+(t.data||'0').slice(0,4), assetId:p.asset.id, txId:t.id,
        gain:gainEur, classe, wl:!!p.asset.wl, fisc: gainEur*fiscFactor(p.asset) });
      p.qty -= q;
      if(p.qty < 1e-9 && p.qty > -1e-9){ p.qty = 0; }
      if(p.qty === 0) p.pmc = 0;
    }
  }
  for(const inc of state.income){
    const p = inc.assetId ? byId.get(inc.assetId) : null;
    if(p) p.income += nettoOf(inc);
  }
  const list = [];
  for(const p of byId.values()){
    const a = p.asset, f = qFactor(a), fx = fxRate(a.valuta);
    p.valore = p.qty * (a.prezzo||0) * f * fx;
    p.costo  = p.qty * p.pmc * f * fx;
    p.pl = p.valore - p.costo;
    p.plPct = p.costo>0 ? p.pl/p.costo*100 : 0;
    p.aperta = p.qty > 1e-9;
    p.realTot = sum(p.realized.map(r=>r.gain));
    list.push(p);
  }
  const aperte = list.filter(p=>p.aperta);
  const valore = sum(aperte.map(p=>p.valore)), costo = sum(aperte.map(p=>p.costo));
  for(const p of aperte) p.peso = valore>0 ? p.valore/valore*100 : 0;
  const realized = list.flatMap(p=>p.realized).sort((a,b)=>a.data.localeCompare(b.data));
  return { byId, list, aperte, txWarn, realized,
    tot:{ valore, costo, pl:valore-costo, plPct: costo>0?(valore-costo)/costo*100:0 } };
}

function nettoOf(inc){
  if(inc.netto!=null && inc.netto!=='') return +inc.netto;
  const a = state.assets.find(x=>x.id===inc.assetId);
  const rate = (inc.tipo==='cedola' && a && a.wl) ? 0.125 : 0.26;
  return round2((+inc.lordo||0)*(1-rate));
}
const lordoOf = inc => inc.lordo!=null && inc.lordo!=='' ? +inc.lordo : null;

/* ================= Motore fiscale (zainetto, stima imposte) ================= */
function simulateFisco(book){
  // Eventi cronologici: minus manuali (01/01 anno), realizzi da vendite.
  const events = [];
  for(const m of state.minus) events.push({data:(m.anno)+'-01-01', kind:'manual', anno:+m.anno, fisc:-Math.abs(+m.importo||0), label:m.nota||'Minus. pregressa (altro intermediario)', id:m.id});
  for(const r of book.realized) events.push({data:r.data, kind:'sale', anno:r.anno, fisc:r.fisc, gain:r.gain, classe:r.classe, wl:r.wl, assetId:r.assetId});
  events.sort((a,b)=> a.data.localeCompare(b.data) || (a.kind==='manual'?-1:1));
  const ledger = [];   // {anno, label, importo, residuo, usi:[{anno,importo}], fonte}
  const years = {};
  const Y = anno => years[anno] ||= {anno, plusRD:0, plusRC:0, minusNew:0, comp:0, taxRD:0, taxRC:0};
  for(const ev of events){
    const yr = Y(ev.anno);
    if(ev.kind==='sale' && ev.classe==='RC' && ev.fisc>0){
      yr.plusRC += ev.fisc; yr.taxRC += ev.fisc*0.26; continue;
    }
    if(ev.fisc >= 0){
      yr.plusRD += ev.fisc;
      let rem = ev.fisc;
      for(const en of ledger){
        if(rem<=1e-9) break;
        if(en.residuo<=1e-9) continue;
        if(ev.anno > en.anno+4) continue;         // scaduta: oltre il 4° anno successivo
        const use = Math.min(en.residuo, rem);
        en.residuo -= use; rem -= use;
        en.usi.push({anno:ev.anno, importo:use});
        yr.comp += use;
      }
      yr.taxRD += rem*0.26;
    } else {
      const imp = -ev.fisc;
      yr.minusNew += imp;
      const a = ev.assetId ? state.assets.find(x=>x.id===ev.assetId) : null;
      ledger.push({anno:ev.anno, importo:imp, residuo:imp,
        label: ev.kind==='manual' ? ev.label : ('Vendita '+(a?a.nome:'titolo')), fonte:ev.kind, usi:[]});
    }
  }
  for(const en of ledger){ en.scadenza = (en.anno+4)+'-12-31'; en.scaduta = thisYear() > en.anno+4; }
  for(const yr of Object.values(years)) yr.taxTot = yr.taxRD + yr.taxRC;
  return {ledger, years};
}
function taxOnIncomeYear(anno){
  let tot=0, noto=true;
  for(const inc of state.income){
    if(+(inc.data||'0').slice(0,4)!==anno) continue;
    const l = lordoOf(inc);
    if(l==null){ noto=false; continue; }
    tot += l - nettoOf(inc);
  }
  return {tot, noto};
}

/* ================= Snapshot storici ================= */
function upsertSnapshot(book){
  const d = todayISO();
  const snap = {data:d, valore: round2(book.tot.valore), costo: round2(book.tot.costo)};
  const i = state.snapshots.findIndex(s=>s.data===d);
  if(i>-1) state.snapshots[i]=snap; else state.snapshots.push(snap);
  state.snapshots.sort((a,b)=>a.data.localeCompare(b.data));
}

/* ================= Salvataggio centralizzato ================= */
let BOOK = null;
function save(opts={}){
  BOOK = buildBook();
  if(!opts.noSnap) upsertSnapshot(BOOK);
  persist();
  if(!opts.noRender) render();
}

  setTimeout(()=>t.remove(), 2600);
}

/* ================= Tooltip ================= */
const tipEl = () => $('#tip');
function showTip(x, y, title, items){
  const t = tipEl(); t.replaceChildren();
  if(title) t.append(h('div',{class:'t-title'}, title));
  for(const it of items){
    t.append(h('div',{class:'t-row'},
      it.color!=null ? h('span',{class:'t-key', style:`background:${it.color};${it.line?'':'height:9px;width:9px;border-radius:3px;'}`}) : null,
      h('span',{class:'t-val'}, it.val), it.label ? h('span',{class:'t-lab'}, it.label) : null,
    ));
  }
  t.style.display='block';
  moveTip(x,y);
}
function moveTip(x,y){
  const t = tipEl(), r = t.getBoundingClientRect();
  let L = x+14, T = y+14;
  if(L+r.width > innerWidth-8)  L = x-r.width-14;
  if(T+r.height > innerHeight-8) T = y-r.height-14;
  t.style.left = Math.max(8,L)+'px'; t.style.top = Math.max(8,T)+'px';
}
function hideTip(){ tipEl().style.display='none'; }
/* Touch: il tooltip appare al tocco e si chiude da solo; col mouse resta legato all'hover */
let _tipT;
function tipTouch(e){ if(e.pointerType==='touch'){ clearTimeout(_tipT); _tipT=setTimeout(hideTip, 2800); } }
const leaveTip = e => { if(e.pointerType!=='touch') hideTip(); };

const lum = hex => {
  const n = hex.replace('#',''); const v = i=>parseInt(n.substr(i,2),16)/255;
  const f = c => c<=.03928 ? c/12.92 : Math.pow((c+.055)/1.055,2.4);
  return .2126*f(v(0)) + .7152*f(v(2)) + .0722*f(v(4));
};

/* ================= Barra impilata orizzontale (allocazione) ================= */
function stackedBar(segments, {fmtVal=fmtEur0}={}){
  const total = sum(segments.map(s=>s.value)) || 1;
  const bar = h('div',{class:'sbar', role:'img', 'aria-label':'Ripartizione'});
  for(const s of segments){
    const pct = s.value/total*100;
    const fTip = e=>{ showTip(e.clientX,e.clientY,s.label,[{color:s.color,val:fmtVal(s.value),label:fmtNum(pct,1)+'%'}]); tipTouch(e); };
    const seg = h('div',{class:'seg', style:`flex:${Math.max(pct,0.6)} 0 0;background:${s.color}`,
      onpointermove:fTip, onpointerdown:fTip,
      onpointerleave:leaveTip},
      pct>=8 ? h('span',{style:`color:${lum(s.color)>.45?'#0b0b0b':'#ffffff'}`}, fmtNum(pct,0)+'%') : null);
    bar.append(seg);
  }
  const legend = h('div',{class:'legend'}, segments.map(s=>h('span',{class:'li'},
    h('span',{class:'sw',style:'background:'+s.color}), s.label+' ',
    h('span',{class:'lval'}, fmtVal(s.value)))));
  return h('div',{}, bar, legend);
}

/* ================= Barre orizzontali (una serie, hue unica) ================= */
function hBars(rows, {color, fmtVal=fmtEur0, showPct=true}={}){
  color = color || cssVar('--s1');
  const max = Math.max(...rows.map(r=>r.value), 1e-9);
  const total = sum(rows.map(r=>r.value)) || 1;
  const wrap = h('div',{class:'hbars'});
  for(const r of rows){
    const pct = r.value/total*100;
    const fTip = e=>{ showTip(e.clientX,e.clientY,r.label,[{color,val:fmtVal(r.value),label:fmtNum(pct,1)+'%'}]); tipTouch(e); };
    wrap.append(h('div',{class:'hb'},
      h('span',{class:'lab', title:r.label}, r.label),
      h('div',{class:'track'},
        h('div',{class:'bar', style:`width:${Math.max(r.value/max*62,0.5)}%;background:${color}`,
          onpointermove:fTip, onpointerdown:fTip,
          onpointerleave:leaveTip}),
        h('span',{class:'val'}, fmtVal(r.value), showPct?h('span',{class:'pct'}, ' · '+fmtNum(pct,1)+'%'):null),
      )));
  }
  return wrap;
}

/* ================= Scala assi ================= */
function niceTicks(min, max, n=4){
  if(max-min < 1e-9) max = min+1;
  const span = max-min, step0 = span/n, mag = Math.pow(10, Math.floor(Math.log10(step0)));
  const step = [1,2,2.5,5,10].map(m=>m*mag).find(s=>span/s<=n+0.5) || 10*mag;
  const lo = Math.floor(min/step)*step, hi = Math.ceil(max/step)*step;
  const ticks=[]; for(let v=lo; v<=hi+1e-9; v+=step) ticks.push(round2(v));
  return {lo, hi, ticks};
}
const fmtAxis = v => Math.abs(v)>=1e6 ? fmtNum(v/1e6,1)+' M€' : Math.abs(v)>=1000 ? fmtNum(v/1000,0)+' k€' : fmtNum(v,0)+' €';

/* ================= Grafico a linee (andamento) ================= */
function lineChart(seriesList, {height=250, zero=false}={}){
  const holder = h('div',{});
  requestAnimationFrame(()=>{
    const W = Math.max(holder.clientWidth||600, 320), H = height;
    const padL=58, padR=14, padT=12, padB=26;
    const pts0 = seriesList[0].points;
    if(pts0.length<2){ holder.append(h('div',{class:'empty'},'Servono almeno due rilevazioni per il grafico.')); return; }
    const xs = pts0.map(p=>Date.parse(p.x));
    const xmin = Math.min(...xs), xmax = Math.max(...xs);
    const allY = seriesList.flatMap(s=>s.points.map(p=>p.y));
    let ymin = Math.min(...allY), ymax = Math.max(...allY);
    if(zero) ymin = Math.min(0,ymin);
    if(ymax-ymin < Math.abs(ymax)*0.01){ const c=(ymax+ymin)/2; ymin=c*0.985; ymax=c*1.015; }  // serie piatta: apri la scala
    const pad=(ymax-ymin)*0.06||1; ymin-=pad; ymax+=pad;
    const sc = niceTicks(ymin,ymax,4);
    const X = t => padL + (t-xmin)/(xmax-xmin||1)*(W-padL-padR);
    const Yc = v => padT + (1-(v-sc.lo)/(sc.hi-sc.lo||1))*(H-padT-padB);
    const svg = sv('svg',{class:'chart', viewBox:`0 0 ${W} ${H}`, width:W, height:H});
    for(const t of sc.ticks){
      svg.append(sv('line',{class:'gridline', x1:padL, x2:W-padR, y1:Yc(t), y2:Yc(t)}));
      svg.append(sv('text',{x:padL-7, y:Yc(t)+3.5, 'text-anchor':'end', style:'font-variant-numeric:tabular-nums'}, fmtAxis(t)));
    }
    svg.append(sv('line',{class:'axis', x1:padL, x2:W-padR, y1:H-padB, y2:H-padB}));
    const nX = Math.min(6, pts0.length);
    for(let i=0;i<nX;i++){
      const t = xmin + (xmax-xmin)*i/(nX-1||1), d = new Date(t);
      svg.append(sv('text',{x:X(t), y:H-padB+16, 'text-anchor': i===0?'start':(i===nX-1?'end':'middle')},
        String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getFullYear()).slice(2)));
    }
    const surface = cssVar('--surface');
    for(const s of [...seriesList].reverse()){
      const d = s.points.map((p,i)=>(i?'L':'M')+X(Date.parse(p.x)).toFixed(1)+' '+Yc(p.y).toFixed(1)).join(' ');
      if(s.area){
        svg.append(sv('path',{d: d+` L${X(Date.parse(s.points.at(-1).x)).toFixed(1)} ${H-padB} L${X(Date.parse(s.points[0].x)).toFixed(1)} ${H-padB} Z`,
          fill:s.color, opacity:'0.1', stroke:'none'}));
      }
      svg.append(sv('path',{d, fill:'none', stroke:s.color, 'stroke-width':2, 'stroke-linejoin':'round', 'stroke-linecap':'round'}));
    }
    const s0 = seriesList[0], last = s0.points.at(-1);
    svg.append(sv('circle',{cx:X(Date.parse(last.x)), cy:Yc(last.y), r:4.5, fill:s0.color, stroke:surface, 'stroke-width':2}));
    // crosshair + tooltip
    const cross = sv('line',{class:'crossh', y1:padT, y2:H-padB, visibility:'hidden'});
    const dots = seriesList.map(s=>sv('circle',{r:4, fill:s.color, stroke:surface,'stroke-width':2, visibility:'hidden'}));
    svg.append(cross, ...dots);
    const idxFromEvent = e => {
      const r = svg.getBoundingClientRect();
      const t = xmin + (e.clientX-r.left-padL)/(W-padL-padR)*(xmax-xmin);
      let best=0,bd=Infinity;
      xs.forEach((x,i)=>{const d=Math.abs(x-t); if(d<bd){bd=d;best=i;}});
      return best;
    };
    const followTip = e=>{
      const i = Math.max(0, Math.min(idxFromEvent(e), pts0.length-1));
      const px = X(xs[i]);
      cross.setAttribute('x1',px); cross.setAttribute('x2',px); cross.setAttribute('visibility','visible');
      seriesList.forEach((s,k)=>{
        const p = s.points[i]; if(!p){dots[k].setAttribute('visibility','hidden');return;}
        dots[k].setAttribute('cx',px); dots[k].setAttribute('cy',Yc(p.y)); dots[k].setAttribute('visibility','visible');
      });
      showTip(e.clientX, e.clientY, fmtDate(pts0[i].x),
        seriesList.map(s=>({color:s.color, line:true, val:fmtEur0(s.points[i]?.y??0), label:s.label})));
      tipTouch(e);
    };
    svg.addEventListener('pointermove', followTip);
    svg.addEventListener('pointerdown', followTip);
    svg.addEventListener('pointerleave', e=>{ if(e.pointerType==='touch') return;
      cross.setAttribute('visibility','hidden'); dots.forEach(d=>d.setAttribute('visibility','hidden')); hideTip(); });
    holder.append(svg);
    if(seriesList.length>1){
      holder.append(h('div',{class:'legend'}, seriesList.map(s=>h('span',{class:'li'},
        h('span',{class:'lw',style:'background:'+s.color}), s.label))));
    }
  });
  return holder;
}

/* ================= Colonne impilate (proventi per anno) ================= */
function columnChart(cats, seriesList, {height=240, fmtVal=fmtEur}={}){
  const holder = h('div',{});
  requestAnimationFrame(()=>{
    const W = Math.max(holder.clientWidth||600, 320), H = height;
    const padL=58, padR=10, padT=18, padB=26, GAP=2;
    const totals = cats.map((_,i)=>sum(seriesList.map(s=>s.values[i]||0)));
    const sc = niceTicks(0, Math.max(...totals,1), 4);
    const Yc = v => padT + (1-(v-0)/(sc.hi||1))*(H-padT-padB);
    const svg = sv('svg',{class:'chart', viewBox:`0 0 ${W} ${H}`, width:W, height:H});
    for(const t of sc.ticks){
      if(t>0) svg.append(sv('line',{class:'gridline', x1:padL, x2:W-padR, y1:Yc(t), y2:Yc(t)}));
      svg.append(sv('text',{x:padL-7, y:Yc(t)+3.5,'text-anchor':'end', style:'font-variant-numeric:tabular-nums'}, fmtAxis(t)));
    }
    const band = (W-padL-padR)/cats.length, bw = Math.min(24, band*0.55);
    cats.forEach((cat,i)=>{
      const cx = padL + band*(i+0.5);
      const g = sv('g',{});
      let acc = 0, topY = Yc(0);
      const segs = seriesList.map(s=>({s, v:s.values[i]||0})).filter(x=>x.v>0);
      segs.forEach((x,k)=>{
        const y1 = Yc(acc+x.v), y0 = Yc(acc)- (k>0?GAP:0);
        const hgt = Math.max(y0-y1, 0.5);
        const isTop = k===segs.length-1;
        topY = y1;
        if(isTop && hgt>4){
          const r = 4, x0 = cx-bw/2;
          g.append(sv('path',{d:`M${x0} ${y0} L${x0} ${y1+r} Q${x0} ${y1} ${x0+r} ${y1} L${x0+bw-r} ${y1} Q${x0+bw} ${y1} ${x0+bw} ${y1+r} L${x0+bw} ${y0} Z`, fill:x.s.color}));
        } else {
          g.append(sv('rect',{x:cx-bw/2, y:y1, width:bw, height:hgt, fill:x.s.color}));
        }
        acc += x.v;
      });
      if(totals[i]>0 && cats.length<=14)
        g.append(sv('text',{x:cx, y:topY-6,'text-anchor':'middle', style:'font-weight:600;fill:var(--ink2);font-variant-numeric:tabular-nums'}, fmtAxis(totals[i])));
      svg.append(sv('text',{x:cx, y:H-padB+16,'text-anchor':'middle'}, cat));
      const hit = sv('rect',{x:padL+band*i, y:padT, width:band, height:H-padT-padB, fill:'transparent'});
      const fTip = e=>{
        g.setAttribute('filter','brightness(1.09)');
        showTip(e.clientX,e.clientY,cat, [
          ...seriesList.map(s=>({color:s.color, val:fmtVal(s.values[i]||0), label:s.label})),
          {val:fmtVal(totals[i]), label:'Totale'},
        ]);
        tipTouch(e);
      };
      hit.addEventListener('pointermove', fTip);
      hit.addEventListener('pointerdown', fTip);
      hit.addEventListener('pointerleave', e=>{ g.removeAttribute('filter'); leaveTip(e); });
      svg.append(g, hit);
    });
    svg.append(sv('line',{class:'axis', x1:padL, x2:W-padR, y1:Yc(0), y2:Yc(0)}));
    holder.append(svg);
    holder.append(h('div',{class:'legend'}, seriesList.map(s=>h('span',{class:'li'},
      h('span',{class:'sw',style:'background:'+s.color}), s.label))));
  });
  return holder;
}

function miniTable(headers, rows, aligns){
  return h('div',{class:'tbl-wrap'}, h('table',{class:'tbl'},
    h('thead',{}, h('tr',{}, headers.map((hd,i)=>h('th',{class:aligns?.[i]==='r'?'num':''},hd)))),
    h('tbody',{}, rows.map(r=>h('tr',{}, r.map((c,i)=>h('td',{class:aligns?.[i]==='r'?'num':''}, c)))))));
}

/* ================= Dashboard ================= */
function kpi(label, value, {hero, delta, deltaCls, note}={}){
  return h('div',{class:'kpi'},
    h('div',{class:'label'}, label),
    h('div',{class:'value'+(hero?' hero':'')}, value),
    delta!=null ? h('div',{class:'delta '+(deltaCls||'')}, delta) : null,
    note ? h('div',{class:'note'}, note) : null);
}
function allocByTipo(){
  const m = new Map();
  for(const p of BOOK.aperte) m.set(p.asset.tipo, (m.get(p.asset.tipo)||0) + p.valore);
  return [...m.entries()].map(([t,v])=>({key:t, label:TIPI[t]?.plural||t, color:tipoColor(t), value:v}))
    .sort((a,b)=>(TIPI[a.key]?.slot||9)-(TIPI[b.key]?.slot||9));
}
function allocByDim(dim){
  const m = new Map();
  for(const p of BOOK.aperte){
    const k = (dim==='valuta' ? p.asset.valuta : p.asset[dim]) || 'Non specificato';
    m.set(k, (m.get(k)||0) + p.valore);
  }
  let rows = [...m.entries()].map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
  if(rows.length>9){ const rest = rows.slice(8); rows = rows.slice(0,8); rows.push({label:'Altre', value:sum(rest.map(r=>r.value))}); }
  return rows;
}

    kpi('P&L realizzato '+y, fmtSEur(realYear), {deltaCls:plClass(realYear), note:'vendite dell’anno, al lordo imposte'}),
    kpi('Proventi netti '+y, fmtEur(incYear), {note:'dividendi e cedole incassati'}),
  ));
  const grid = h('div',{class:'grid cols-32 mt'});
  // Andamento
  const snaps = state.snapshots;
  grid.append(chartCard('andamento', {
    title:'Andamento del portafoglio', sub:'valore e capitale investito · rilevazioni salvate automaticamente',
    chart:()=> lineChart([
      {label:'Valore',   color:cssVar('--s1'), points:snaps.map(s=>({x:s.data,y:s.valore})), area:true},
      {label:'Investito',color:cssVar('--baseline'), points:snaps.map(s=>({x:s.data,y:s.costo}))},
    ]),
    table:()=> miniTable(['Data','Valore','Investito','P&L'],
      [...snaps].reverse().map(s=>[fmtDate(s.data), fmtEur(s.valore), fmtEur(s.costo),
        h('span',{class:plClass(s.valore-s.costo)}, fmtSEur(s.valore-s.costo))]), ['l','r','r','r']),
  }));
  // Allocazione per tipo
  const segs = allocByTipo();
  grid.append(chartCard('alloctipo', {
    title:'Allocazione per strumento', sub:'quota sul valore di mercato',
    chart:()=> stackedBar(segs),
    table:()=> miniTable(['Strumento','Valore','Quota'],
      segs.map(s=>[h('span',{class:'chip'},h('span',{class:'dot',style:'background:'+s.color}),s.label),
        fmtEur(s.value), fmtNum(s.value/(BOOK.tot.valore||1)*100,1)+'%']), ['l','r','r']),
  }));
  view.append(grid);
  const grid2 = h('div',{class:'grid cols-2 mt'});
  // Allocazione per dimensione
  const dims = [['settore','Settore'],['area','Area geografica'],['banca','Banca'],['valuta','Valuta']];
  const rows = allocByDim(ui.allocDim);
  grid2.append(chartCard('allocdim', {
    title:'Diversificazione', sub:'per '+dims.find(d=>d[0]===ui.allocDim)[1].toLowerCase(),
    controls: h('span',{class:'pill-group'}, dims.map(([k,l])=>h('button',{class:'pill'+(ui.allocDim===k?' active':''),

    chart:()=> hBars(rows),

      rows.map(r=>[r.label, fmtEur(r.value), fmtNum(r.value/(BOOK.tot.valore||1)*100,1)+'%']), ['l','r','r']),
  }));
  // Posizioni principali
  const top = [...BOOK.aperte].sort((a,b)=>b.valore-a.valore).slice(0,7)
    .map(p=>({label:p.asset.nome, value:p.valore}));
  grid2.append(chartCard('top', {
    title:'Posizioni principali', sub:'prime posizioni per controvalore',
    chart:()=> hBars(top),
    table:()=> miniTable(['Titolo','Valore','Peso'],
      top.map(r=>[r.label, fmtEur(r.value), fmtNum(r.value/(BOOK.tot.valore||1)*100,1)+'%']), ['l','r','r']),
  }));
  view.append(grid2);

/* ================= Modali & campi ================= */
function openModal({title, sub, body, wide, actions}){
  const root = $('#modalRoot');
  const back = h('div',{class:'modal-back', role:'dialog', 'aria-modal':'true'});
  const onEsc = e => { if(e.key==='Escape') close(); };
  function close(){ back.remove(); document.removeEventListener('keydown', onEsc); }
  const m = h('div',{class:'modal'+(wide?' wide':'')},
    h('h3',{}, title), sub?h('div',{class:'m-sub'},sub):null, body,
    h('div',{class:'m-actions'}, actions.map(a=>h('button',{class:'btn '+(a.kind||''),
      onclick:()=>{ if(a.onClick(close)!==false){} }}, a.label))));
  back.append(m);
  back.addEventListener('pointerdown', e=>{ if(e.target===back) close(); });
  document.addEventListener('keydown', onEsc);
  root.append(back);
  const f = m.querySelector('input,select,textarea'); if(f) setTimeout(()=>f.focus(),30);
  return close;
}
function confirmModal(title, msg, onOk, {okLabel='Elimina'}={}){
  openModal({title, body:h('div',{style:'font-size:13.5px;line-height:1.55'}, msg), actions:[
    {label:'Annulla', onClick:c=>c()},
    {label:okLabel, kind:'primary danger', onClick:c=>{c(); onOk();}},
  ]});
}
const inp = (props={}) => h('input',{class:'in'+(props.num?' num':''), type:props.type||'text',
  value:props.value??'', placeholder:props.placeholder||'', inputmode:props.num?'decimal':null,
  id:props.id||null});
const fld = (label, el, hint) => h('label',{class:'fld'}, h('span',{},label), el,
  hint?h('div',{class:'hint',style:'margin:4px 0 0'},hint):null);
function sel(options, value){
  const s = h('select',{class:'in'});
  for(const [v,l] of options) s.append(h('option',{value:v, selected:String(v)===String(value)?'':null}, l));
  s.value = value ?? options[0][0];
  return s;
}
const readNum = el => parseNum(el.value);

  const fArea = inp({value:a.area, placeholder:'es. Italia, USA, Globale…'});
  const fBanca = inp({value:a.banca, placeholder:'es. Sella, UBS…'});

    h('span',{}, 'Titolo di Stato / white list — tassazione agevolata 12,5%'));

function deleteAsset(a){
  const nTx = state.txs.filter(t=>t.assetId===a.id).length;

/* Quotazioni via endpoint pubblico Yahoo Finance (non ufficiale): nessuna chiave, CORS aperto. */
async function yahooQuote(sym){
  const res = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=1d');
  if(!res.ok) throw new Error('HTTP '+res.status);
  const m = (await res.json())?.chart?.result?.[0]?.meta;
  if(!m || m.regularMarketPrice==null) throw new Error('quotazione assente');
  return m;   // {regularMarketPrice, currency}
}
function makeQuoteFetcher(){
  const fx = {};   // tassi EUR→CCY
  async function eurRate(ccy){
    if(!(ccy in fx)) fx[ccy] = (await yahooQuote('EUR'+ccy+'=X')).regularMarketPrice;
    if(!fx[ccy]) throw new Error('cambio '+ccy+' non disponibile');
    return fx[ccy];
  }
  return async function fetchInCcy(sym, targetCcy){
    const m = await yahooQuote(sym);
    let px = m.regularMarketPrice, ccy = m.currency||'EUR';
    if(ccy==='GBp'||ccy==='GBX'){ px = px/100; ccy = 'GBP'; }
    if(ccy === targetCcy) return px;
    const pxEur = ccy==='EUR' ? px : px/await eurRate(ccy);
    return targetCcy==='EUR' ? pxEur : pxEur*await eurRate(targetCcy);
  };
}
function openPriceForm(){
  const open = BOOK.aperte;
  if(!open.length){ toast('Nessuna posizione aperta'); return; }
  const fData = inp({type:'date', value:todayISO()});
  const rows = open.map(p=>({p, f:inp({num:true, value:p.asset.prezzo??''})}));
  const withTicker = rows.filter(r=>r.p.asset.ticker);
  const qStatus = h('span',{class:'hint',style:'margin:0'});
  async function autoQuotes(btn){
    if(!withTicker.length){ qStatus.textContent='Nessun titolo ha un ticker: aggiungilo da Posizioni → Modifica.'; return; }
    btn.disabled = true;
    const fetchInCcy = makeQuoteFetcher();
    const ko = [];
    for(let i=0;i<withTicker.length;i++){
      const r = withTicker[i];
      qStatus.textContent = `Scarico ${i+1}/${withTicker.length} — ${r.p.asset.ticker}…`;
      try{
        const px = await fetchInCcy(r.p.asset.ticker, r.p.asset.valuta||'EUR');
        r.f.value = fmtNum(px, 6);
        r.f.style.outline = '2px solid var(--good)'; r.f.style.outlineOffset = '-1px';
      }catch(e){ ko.push(r.p.asset.ticker); r.f.style.outline='2px solid var(--serious)'; r.f.style.outlineOffset='-1px'; }
      await new Promise(s=>setTimeout(s, 180));
    }
    qStatus.textContent = `Scaricate ${withTicker.length-ko.length} quotazioni su ${withTicker.length}`
      + (ko.length ? ` — non trovate: ${ko.slice(0,5).join(', ')}${ko.length>5?'…':''}` : '')
      + '. Controlla i valori e premi Salva prezzi.';
    btn.disabled = false;
  }
  openModal({title:'Aggiorna prezzi di mercato', wide:true,
    sub:'Inserisci le ultime quotazioni: lo storico del portafoglio si aggiorna automaticamente.',
    body:h('div',{},
      h('div',{style:'display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:4px'},

        h('tbody',{}, rows.map(r=>h('tr',{},
          h('td',{},h('span',{class:'main'},r.p.asset.nome), isBond(r.p.asset)?h('span',{class:'sm'},' — % nominale'):(r.p.asset.valuta!=='EUR'?h('span',{class:'sm'},' — '+r.p.asset.valuta):null)),
          h('td',{class:'num'}, fmtNum(r.p.asset.prezzo,4)),

    actions:[

function parseCSV(text){
  const firstNL = text.indexOf('\n');
  const first = firstNL>-1 ? text.slice(0,firstNL) : text;
  const delim = [';','\t',','].map(d=>[d,(first.match(new RegExp(d==='\t'?'\t':'\\'+d,'g'))||[]).length])
    .sort((a,b)=>b[1]-a[1])[0][0];
  const rows=[]; let row=[], cell='', inQ=false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else inQ=false; } else cell+=c; }
    else if(c==='"') inQ=true;
    else if(c===delim){ row.push(cell); cell=''; }
    else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n') i++; row.push(cell); cell='';
      if(row.some(x=>x.trim()!=='')) rows.push(row); row=[]; }
    else cell+=c;
  }
  row.push(cell); if(row.some(x=>x.trim()!=='')) rows.push(row);
  return rows;
}

function guessTipo(s){
  s = (s||'').toLowerCase();
  if(/etf|etc|etn/.test(s)) return 'etf';
  if(/obblig|bond|btp|bot|cct|ctz|tit.*stato/.test(s)) return 'obbligazione';
  if(/fondo|fund|sicav|oicr/.test(s)) return 'fondo';
  if(/private|pe\b/.test(s)) return 'pe';
  if(/crypto|bitcoin|eth/.test(s)) return 'crypto';
  if(/azion|stock|equity|share/.test(s)) return 'azione';
  return 'altro';
}
function findAsset(key){
  key = (key||'').trim().toLowerCase();
  if(!key) return null;
  return state.assets.find(a=>a.isin && a.isin.toLowerCase()===key)
      || state.assets.find(a=>a.nome.toLowerCase()===key)
      || state.assets.find(a=>a.nome.toLowerCase().includes(key)||key.includes(a.nome.toLowerCase()));
}
function importWizardCard(){
  const fType = sel([['posizioni','Posizioni (dossier attuale)'],['prezzi','Solo aggiornamento prezzi'],['movimenti','Movimenti (compra/vendita)'],['proventi','Proventi (dividendi e cedole)']], 'posizioni');
  const fDataP = inp({type:'date', value:todayISO()});
  const fFile = h('input',{type:'file', accept:'.csv,.txt,.tsv', style:'display:none'});
  const fTxt = h('textarea',{class:'in', placeholder:'…oppure incolla qui il contenuto CSV (con intestazioni)', style:'min-height:90px'});
  const drop = h('div',{class:'file-drop', onclick:()=>fFile.click()},'Scegli un file CSV esportato dalla banca (o trascinalo qui)');
  const stage = h('div',{});
  drop.addEventListener('dragover', e=>{e.preventDefault(); drop.classList.add('on');});
  drop.addEventListener('dragleave', ()=>drop.classList.remove('on'));
  drop.addEventListener('drop', e=>{e.preventDefault(); drop.classList.remove('on');
    const f = e.dataTransfer.files[0]; if(f) readFile(f); });
  fFile.addEventListener('change', ()=>{ if(fFile.files[0]) readFile(fFile.files[0]); });
  function readFile(f){ const r = new FileReader(); r.onload = ()=>{ fTxt.value = r.result; analyze(); }; r.readAsText(f, 'utf-8'); }
  function analyze(){
    stage.replaceChildren();
    const rows = parseCSV(fTxt.value||'');
    if(rows.length<2){ stage.append(h('div',{class:'banner warn'},'Servono almeno una riga di intestazione e una di dati.')); return; }
    const head = rows[0].map(s=>s.trim());
    const fields = IMP_FIELDS[fType.value];
    const maps = {};
    const mapSel = fields.map(([key,label,rx])=>{
      const guess = head.findIndex(hd=>rx.test(hd));
      const s = sel([['-1','— non presente —'], ...head.map((hd,i)=>[String(i), hd||('colonna '+(i+1))])], String(guess));
      maps[key]=s;
      return [h('span',{style:'color:var(--ink2)'},label), s];
    });
    const prev = rows.slice(1,5);
    stage.append(
      h('div',{class:'section-title', style:'margin-top:14px'},'Abbina le colonne'),
      h('div',{class:'map-grid'}, mapSel.flat()),
      fType.value==='prezzi' ? h('div',{style:'max-width:220px;margin-top:10px'},
        fld('Data delle quotazioni', fDataP, 'il prezzo può mancare: basta controvalore + quantità')) : null,
      h('div',{class:'section-title'},'Anteprima ('+(rows.length-1)+' righe)'),
      miniTable(head, prev.map(r=>head.map((_,i)=>r[i]||'')),[]),
      h('div',{style:'margin-top:12px'}, h('button',{class:'btn primary', onclick:()=>doImport(rows, maps)},
        (fType.value==='prezzi'?'Aggiorna prezzi da ':'Importa ')+(rows.length-1)+' righe')));
  }
  function val(r, maps, key){ const i = +maps[key].value; return i>=0 ? (r[i]||'').trim() : ''; }
  function doImport(rows, maps){
    const type = fType.value, body = rows.slice(1);
    let ok=0, ko=0; const errs=[], created=[];
    for(const r of body){
      try{
        if(type==='posizioni'){
          const nome = val(r,maps,'nome'); if(!nome) throw 'nome mancante';
          const isin = val(r,maps,'isin').toUpperCase();
          let a = findAsset(isin) || findAsset(nome);
          const qta = parseNum(val(r,maps,'qta')), pmc = parseNum(val(r,maps,'pmc')), prezzo = parseNum(val(r,maps,'prezzo'));
          if(!a){
            a = {id:uid(), nome, isin, ticker:'', tipo:guessTipo(val(r,maps,'tipo')||nome), wl:false, fiscale:'auto',
              valuta:(val(r,maps,'valuta')||'EUR').toUpperCase().slice(0,3)||'EUR', settore:val(r,maps,'settore'), area:val(r,maps,'area'),
              banca:val(r,maps,'banca'), cedola:null, scadenza:null, prezzo:prezzo??pmc??0, prezzoData:todayISO(), note:''};
            if(!CCYS.includes(a.valuta)) a.valuta='EUR';
            state.assets.push(a); created.push(a.nome);
          } else if(prezzo!=null){ a.prezzo=prezzo; a.prezzoData=todayISO(); }
          if(qta && pmc!=null){
            state.txs.push({id:uid(), seq:state.txs.length, assetId:a.id, data:todayISO(), tipo:'buy', qta, prezzo:pmc, comm:0, note:'Import CSV — posizione'});
          }
        } else if(type==='prezzi'){
          const a = findAsset(val(r,maps,'titolo')); if(!a) throw 'titolo non trovato: '+(val(r,maps,'titolo')||'(vuoto)');
          if(a.settore==='Liquidità' && a.prezzo===1) throw 'liquidità (aggiorna il saldo dal movimento): '+a.nome;
          let px = parseNum(val(r,maps,'prezzo'));
          if(px==null){
            const ctv = parseNum(val(r,maps,'ctv')), q = parseNum(val(r,maps,'qta'));
            if(ctv!=null && q) px = ctv/q*(isBond(a)?100:1);
          }
          if(px==null || px<=0) throw 'prezzo non ricavabile per '+a.nome;
          a.prezzo = Math.round(px*1e8)/1e8;
          a.prezzoData = fDataP.value || todayISO();
        } else if(type==='movimenti'){
          const a = findAsset(val(r,maps,'titolo')); if(!a) throw 'titolo non trovato: '+val(r,maps,'titolo');
          const data = parseDateAny(val(r,maps,'data')); if(!data) throw 'data non valida';
          const q = parseNum(val(r,maps,'qta')), p = parseNum(val(r,maps,'prezzo'));
          if(!q||p==null) throw 'quantità o prezzo non validi';
          const ts = val(r,maps,'tipo').toLowerCase();
          const tipo = /vend|sell|v\b|^-|scar/i.test(ts) ? 'sell' : 'buy';
          state.txs.push({id:uid(), seq:state.txs.length, assetId:a.id, data, tipo, qta:Math.abs(q), prezzo:p, comm:parseNum(val(r,maps,'comm'))||0, note:'Import CSV'});
        } else {
          const a = findAsset(val(r,maps,'titolo')); if(!a) throw 'titolo non trovato: '+val(r,maps,'titolo');
          const data = parseDateAny(val(r,maps,'data')); if(!data) throw 'data non valida';
          const lordo = parseNum(val(r,maps,'lordo')), netto = parseNum(val(r,maps,'netto'));
          if(lordo==null && netto==null) throw 'importo mancante';
          const ts = val(r,maps,'tipo').toLowerCase();
          state.income.push({id:uid(), assetId:a.id, data, tipo:/cedol|coupon/.test(ts)?'cedola':'dividendo', lordo, netto});
        }
        ok++;
      }catch(e){ ko++; if(errs.length<6) errs.push(String(e)); }
    }
    save({noRender:true});   // il report resta visibile: le altre schede si aggiornano alla prossima navigazione
    stage.replaceChildren(h('div',{class:'imp-report'},
      h('div',{},h('span',{class:'ok'},ok+' righe importate'),' · ',h('span',{class:ko?'ko':''},ko+' scartate')),
      created.length?h('div',{},'Nuovi titoli creati: '+created.join(', ')):null,
      errs.length?h('div',{style:'color:var(--muted)'},'Motivi: '+errs.join(' · ')):null));
    toast('Import completato: '+ok+' righe');
  }
  fType.addEventListener('change', ()=>{ if(fTxt.value.trim()) analyze(); });
  fTxt.addEventListener('input', ()=>{ clearTimeout(fTxt._t); fTxt._t=setTimeout(analyze, 400); });
  return h('div',{class:'card'},
    h('h3',{},'Importa da CSV'),
    h('div',{class:'sub'},'esporta il dossier o i movimenti dalla tua banca in CSV e collega ogni colonna al campo giusto'),
    h('div',{class:'frm-grid'},
      h('div',{class:'full'}, fld('Cosa stai importando?', fType)),
      h('div',{class:'full'}, drop, fFile),
      h('div',{class:'full'}, fTxt)),
    stage);
}

/* ================= Tab Dati & backup ================= */
function anchorDownload(name, text, mime){
  const a = h('a',{href:URL.createObjectURL(new Blob([text],{type:mime})), download:name});
  document.body.append(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();}, 300);
}
function download(name, text, mime='application/json'){
  // Su iPhone/iPad usa il foglio di condivisione (salva su File, AirDrop, ecc.); altrove scarica il file
  try{
    const file = new File([text], name, {type:mime});
    if(navigator.canShare && navigator.canShare({files:[file]}) && window.matchMedia('(pointer:coarse)').matches){
      navigator.share({files:[file], title:name}).catch(err=>{
        if(!err || err.name!=='AbortError') anchorDownload(name, text, mime);
      });
      return;
    }
  }catch(e){ /* File/canShare non supportati: fallback */ }
  anchorDownload(name, text, mime);
}

        ()=>{state.snapshots=[]; save(); toast('Storico azzerato');}, {okLabel:'Azzera storico'})},'Azzera storico andamento'),
      h('button',{class:'btn danger', onclick:()=>confirmModal('Cancellare TUTTI i dati?','Titoli, movimenti, proventi, zainetto e storico verranno eliminati definitivamente da questo browser.',
        ()=>{state = DEFAULTS(); applyTheme(); save(); toast('Dati cancellati');})},'Cancella tutti i dati'))));
  view.append(h('div',{class:'disc mt'},
    'Dossier Titoli è un’app locale: i dati non lasciano mai il tuo dispositivo. Nessun collegamento alla banca, nessun invio in rete. ',
    'Le informazioni fiscali sono stime indicative e non costituiscono consulenza fiscale o d’investimento. ',
    'Su iPhone: apri questo file dentro l’app “Documents” (Readdle) — i dati restano salvati lì; ogni dispositivo ha il proprio archivio, usa Esporta/Ripristina backup per trasferirli.'));
}

/* ================= Tema ================= */
const mq = window.matchMedia('(prefers-color-scheme: dark)');
function applyTheme(){
  const s = state.settings.theme||'auto';
  const resolved = s==='auto' ? (mq.matches?'dark':'light') : s;
  document.documentElement.dataset.theme = resolved;
  const b = $('#btnTheme');
  if(b) b.textContent = {auto:'Tema: auto', light:'Tema: chiaro', dark:'Tema: scuro'}[s];
}
mq.addEventListener('change', ()=>{ if((state.settings.theme||'auto')==='auto'){ applyTheme(); render(); } });

/* ================= Avvio ================= */
loadState();
BOOK = buildBook();
if(state.assets.length){ upsertSnapshot(BOOK); persist(); }
applyTheme();
$('#btnTheme').addEventListener('click', ()=>{
  const order = ['auto','light','dark'];
  state.settings.theme = order[(order.indexOf(state.settings.theme||'auto')+1)%3];
  persist(); applyTheme(); render();
});
$('#btnPrezzi').addEventListener('click', ()=>{ BOOK = buildBook(); openPriceForm(); });
render();
</script>
